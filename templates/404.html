<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000000; color: #FFFFFF; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="text-center">
        <h1 class="text-6xl font-bold text-white/20 mb-4">404</h1>
        <h2 class="text-xl font-medium text-white/60 mb-2">Page Not Found</h2>
        <p class="text-white/40 mb-6">The page you're looking for doesn't exist.</p>
        <a href="/" class="inline-block px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors">
            Go Home
        </a>
    </div>
</body>
</html>
