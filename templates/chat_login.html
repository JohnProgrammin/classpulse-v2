{% extends "layout.html" %}

{% block title %}Sign In - ClassPulse{% endblock %}

{% block extra_css %}
<style>
    body {
        background-color: #FFFFFF !important;
    }

    main {
        padding-top: 0 !important;
    }

    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        /* Adjust for nav height */
        background-color: #FFFFFF;
    }

    .auth-container {
        width: 100%;
        max-width: 400px;
        padding: 40px 24px;
        text-align: center;
    }

    .auth-header h1 {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 40px;
        color: #242424;
    }

    .input-group {
        margin-bottom: 24px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #6B6B6B;
        margin-bottom: 8px;
    }

    .auth-input {
        width: 100%;
        padding: 12px 0;
        background-color: transparent;
        border: none;
        border-bottom: 1px solid #F2F2F2;
        border-radius: 0;
        font-size: 16px;
        color: #242424;
        transition: border-color 0.2s;
    }

    .auth-input:focus {
        outline: none;
        border-bottom-color: #242424;
    }

    .auth-submit {
        width: 100%;
        padding: 12px;
        background-color: #242424;
        color: #FFFFFF;
        border-radius: 24px;
        font-size: 15px;
        font-weight: 500;
        margin-top: 16px;
        transition: background-color 0.2s;
        cursor: pointer;
    }

    .auth-submit:hover {
        background-color: #000000;
    }

    .auth-footer {
        margin-top: 32px;
        font-size: 14px;
        color: #6B6B6B;
    }

    .auth-footer a {
        color: #1A8917;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .relative {
        position: relative;
    }

    .password-toggle {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        color: #6B6B6B;
        background: none;
        border: none;
        padding: 8px;
        cursor: pointer;
    }

    .password-toggle:hover {
        color: #242424;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container fade-in">
        <div class="auth-header">
            <h1 class="serif">Welcome back.</h1>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="auth-input" required autofocus>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password" class="auth-input pr-10" required>
                    <button type="button" onclick="togglePassword()" class="password-toggle">
                        <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-submit">
                Continue
            </button>
        </form>

        <div class="auth-footer">
            No account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.setAttribute('data-lucide', 'eye-off');
        } else {
            passwordInput.type = 'password';
            eyeIcon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }
</script>
{% endblock %}
