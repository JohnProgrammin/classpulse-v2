{% extends "layout.html" %}

{% block title %}Join ClassPulse{% endblock %}

{% block extra_css %}
<style>
    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        background-color: var(--theme-bg);
    }

    .auth-container {
        width: 100%;
        max-width: 400px;
        padding: 40px 24px;
        text-align: center;
    }

    .auth-header h1 {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        color: var(--theme-text);
    }

    .role-badge {
        display: inline-block;
        padding: 4px 12px;
        background-color: var(--brand-green);
        color: white;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-radius: 4px;
        margin-bottom: 32px;
        opacity: 0.8;
    }

    .input-group {
        margin-bottom: 24px;
        text-align: left;
    }

    .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--theme-secondary);
        margin-bottom: 8px;
    }

    .auth-input {
        width: 100%;
        padding: 12px 0;
        background-color: transparent;
        border: none;
        border-bottom: 1px solid var(--theme-divider);
        border-radius: 0;
        font-size: 16px;
        color: var(--theme-text);
        transition: border-color 0.2s;
    }

    .auth-input:focus {
        outline: none;
        border-bottom-color: var(--theme-text);
    }

    .auth-submit {
        width: 100%;
        padding: 14px;
        background-color: var(--theme-text);
        color: var(--theme-bg);
        border-radius: 24px;
        font-size: 15px;
        font-weight: 700;
        margin-top: 16px;
        transition: opacity 0.2s;
        cursor: pointer;
    }

    .auth-submit:hover {
        opacity: 0.9;
    }

    .auth-footer {
        margin-top: 32px;
        font-size: 14px;
        color: var(--theme-secondary);
    }

    .auth-footer a {
        color: var(--brand-green);
        font-weight: 600;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .relative {
        position: relative;
    }

    .password-toggle {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        color: var(--theme-secondary);
        background: none;
        border: none;
        padding: 8px;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container fade-in">
        <div class="auth-header">
            <span class="role-badge">Student Portal</span>
            <h1 class="serif">Create your account.</h1>
        </div>

        <form method="POST" action="{{ url_for('chat_register') }}">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="auth-input" placeholder="e.g. john_doe" required autofocus>
            </div>

            <div class="input-group">
                <label for="display_name">Display Name</label>
                <input type="text" name="display_name" id="display_name" class="auth-input" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="auth-input" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password" class="auth-input pr-10" placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword()" class="password-toggle">
                        <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-submit">
                Create account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('chat_login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.setAttribute('data-lucide', 'eye-off');
        } else {
            passwordInput.type = 'password';
            eyeIcon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }
</script>
{% endblock %}
